# Secret scanning — blocks any push/PR that contains a leaked secret.
# This is the one automatic guard worth having on every Real-data project:
# a non-engineer can't spot a leaked API key in a diff, but this can.
# It only fails when it actually finds a secret — the exact moment you want a hard stop.
#
# Copy this file into your project's .github/workflows/ folder.
# No configuration or maintenance needed.

name: secret-scan

on:
  push:
  pull_request:

jobs:
  gitleaks:
    name: Scan for leaked secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # No license needed for public repos. For private/org repos, set
          # GITLEAKS_LICENSE in repo secrets (free for small teams).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
